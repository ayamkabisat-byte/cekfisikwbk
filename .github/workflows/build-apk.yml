name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Pastikan Capacitor CLI tersedia (install global jika belum)
      - name: Install Capacitor CLI (if missing)
        run: npm install -g @capacitor/cli

      - name: Build web app (Vite default: dist)
        run: npm run build

      # Buat file capacitor.config.json jika belum ada (atau sesuaikan webDir)
      - name: Ensure Capacitor config
        run: |
          if [ ! -f capacitor.config.json ]; then
            echo '{
              "appId": "com.yourcompany.cekfisik",
              "appName": "Cek Fisik WBK",
              "webDir": "dist",
              "bundledWebRuntime": false
            }' > capacitor.config.json
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Add Android platform (if not exists)
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CekFisikWBK-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
